# 0720 업무 공유 — 마이페이지/로그인 화면

작성일: 2026-07-20 · 대상: 개발 전달 및 팀 공유

---

## 1. 요약

마이페이지, 로그인 전 헤더, 로그인 후 헤더, 어드민 대시보드 사이드 화면을 개편했다.

---

## 2. 신규 / 변경 화면

| 화면 | 내용 |
|---|---|
| 마이페이지 | 로그인 상태 마이페이지 (로그인 헤더·로그아웃 모달·회원탈퇴 링크 포함) |
| 로그인 후 헤더 페이지 | 영상생성·크레딧·프로필 드롭다운 로그인 헤더 |
| 회원탈퇴 | 회원탈퇴 확인 페이지 |
| 정보수정 페이지 | 이메일·비밀번호 변경, 프로필 이미지 편집 |

---

## 3. 업무 공유

| 페이지 | 작업 내용 |
|---|---|
| 마이페이지 (`mypage.html`) | 마이페이지 UI 디자인 개편 및 프로필 이미지 영역 추가 |
| 마이페이지 로그인 (`mypage-login.html`) | 로그인 후 헤더 영역(영상생성·크레딧·프로필) 반영 |
| 내 정보 수정 (`edit.html`) | UI 개편 및 프로필 설정 영역 추가 |
| 회원탈퇴 (`withdraw.html`) | 화면 UI 개선 |
| 어드민 대시보드 (`admin-dashboard.html`) | 사이드바 좌측 하단 관리자 프로필(아바타) 영역 삭제, 역할·이름 + 로그아웃만 유지 |

### 개발 전달 번들 (`개발전달-마이페이지/`)

개발자에게 넘기는 정적 HTML 산출물. 프레임워크 없이 HTML+CSS+JS, 화면 단위로 CSS/JS 분리(레이어: tokens → common → {group}-common → {page}).

```
개발전달-마이페이지/
├─ mypage.html            로그인 상태 마이페이지
├─ mypage-login.html      로그인 후 헤더 반영 마이페이지
├─ edit.html              내 정보 수정
├─ withdraw.html          회원탈퇴
├─ admin-dashboard.html   관리자 대시보드 사이드바
├─ css/
│  ├─ tokens.css          디자인 토큰(색·간격·라운드·그림자·모션) — 정본
│  ├─ common.css          공통: 리셋·헤더·드로어·공통 버튼·모달 a11y·mesh
│  ├─ mypage-common.css   마이페이지군 공용: 아바타·크롭·폼·로그아웃 모달
│  ├─ mypage.css          마이페이지 전용
│  ├─ edit.css            내 정보 수정 전용
│  ├─ withdraw.css        회원탈퇴 전용
│  └─ admin-dashboard.css 관리자 사이드바 전용
├─ js/
│  ├─ common.js           헤더 프로필·드로어·모달 포커스 트랩·mesh 셰이더
│  ├─ mypage-common.js    아바타 메뉴·크롭·로그아웃 모달
│  ├─ mypage.js           마이페이지 전용(결제 위자드·인포 모달)
│  ├─ edit.js             내 정보 수정(이메일·비번 변경·비번 규칙)
│  ├─ withdraw.js         회원탈퇴 게이트(확인 문구 입력)
│  └─ admin-dashboard.js  관리자 사이드바 활성 토글
└─ image/
   ├─ logo.svg            상인월드 로고
   └─ (카드사 8종) shinhan·kb·hyundaicard·lottecard·wooribank·nh·bc·hana.svg
```

| 레이어 | 파일 | 역할 |
|---|---|---|
| ① 토큰 | `tokens.css` | 색·간격·라운드·그림자·모션 변수(정본) |
| ② 공통 | `common.css` / `common.js` | 모든 페이지 공용(헤더·드로어·모달 a11y·mesh) |
| ③ 페이지군 공용 | `mypage-common.css` / `mypage-common.js` | 마이페이지 계열 공용(아바타·크롭·폼·로그아웃) |
| ④ 페이지 전용 | `{page}.css` / `{page}.js` | 해당 화면에서만 쓰는 규칙 |

> 링크 순서 고정: `tokens → common → (group-common) → page`. 각 HTML은 실제 참조하는 CSS/JS + image 자산만 포함.

## 5. 발견한 문제점 (마이페이지 및 모바일 메뉴)

<script src="https://unpkg.com/lucide@latest"></script>
<script>
(function(){
  "use strict";

  // ---------- 데이터 수집 ----------
  var blocks = Array.prototype.slice.call(document.querySelectorAll('script[type="text/markdown"]'));
  var reports = blocks.map(function(b){
    return {
      id: b.dataset.reportId,
      category: b.dataset.category || '업무 공유',
      date: b.dataset.date,
      title: b.dataset.title,
      file: b.dataset.file || (b.dataset.reportId + '.md'),
      // 소스에 쓴 escaped 닫는 스크립트 태그를 실제 태그로 복원(컨테이너 조기 종료 방지)
      md: b.textContent.replace(/^\n/, '').replace(/<\\\/script>/g, '<\/script>')
    };
  }).sort(function(a,b){ return a.date < b.date ? 1 : -1; }); // 최신 날짜 위로

  var navEl = document.querySelector('[data-nav]');
  var docEl = document.querySelector('[data-doc]');
  var tocEl = document.querySelector('[data-toc]');
  var crumbEl = document.querySelector('[data-crumb]');
  var dlBtn = document.querySelector('[data-download]');
  var sidebar = document.querySelector('[data-sidebar]');
  var scrim = document.querySelector('[data-scrim]');
  var current = null;

  // ---------- 마크다운 렌더러 (headings/hr/list/table/bold/code/link) ----------
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    s = esc(s);
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" class="doc-img" loading="lazy">');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/\{\{!([^}]+)\}\}/g,'<span class="doc-badge doc-badge--red">$1</span>');
    s = s.replace(/\{\{([^}]+)\}\}/g,'<span class="doc-badge">$1</span>');
    return s;
  }
  function slug(s){ return s.toLowerCase().replace(/[^\w가-힣]+/g,'-').replace(/^-+|-+$/g,''); }
  function splitRow(r){ return r.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(function(c){return c.trim();}); }

  function renderMd(md){
    var lines = md.replace(/\r\n/g,'\n').split('\n');
    if(lines[0] && lines[0].trim()==='---'){ var e=lines.indexOf('---',1); if(e>0) lines=lines.slice(e+1); }
    var out=[], i=0, toc=[];
    while(i<lines.length){
      var ln=lines[i];
      if(/^\s*$/.test(ln)){ i++; continue; }
      if(/^---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
      // fenced code block ```
      if(/^```/.test(ln)){
        var buf=[]; i++;
        while(i<lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++; // 닫는 펜스 스킵
        out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>');
        continue;
      }
      var h=ln.match(/^(#{1,6})\s+(.*)$/);
      if(h){
        var lv=h[1].length, txt=h[2].trim(), id=slug(txt);
        out.push('<h'+lv+' id="'+id+'">'+inline(txt)+'</h'+lv+'>');
        if(lv===2||lv===3) toc.push({lv:lv,id:id,txt:txt});
        i++; continue;
      }
      // table
      if(/^\s*\|.*\|\s*$/.test(ln) && i+1<lines.length && /-/.test(lines[i+1]) && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1])){
        var head=splitRow(ln); i+=2; var rows=[];
        while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ rows.push(splitRow(lines[i])); i++; }
        var t='<div class="twrap"><table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
        t+=rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';}).join('');
        t+='</tbody></table></div>'; out.push(t); continue;
      }
      // unordered list (+ task list: `- [x]` / `- [ ]`)
      if(/^\s*[-*]\s+/.test(ln)){
        var items=[];
        while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
        var isTask = items.some(function(it){ return /^\[[ xX]\]\s?/.test(it); });
        if(isTask){
          out.push('<ul class="tasklist">'+items.map(function(it){
            var m=it.match(/^\[([ xX])\]\s?([\s\S]*)$/);
            if(m){ var done=m[1].toLowerCase()==='x'; return '<li class="task'+(done?' is-done':'')+'">'+inline(m[2])+'</li>'; }
            return '<li class="subnote">'+inline(it)+'</li>';
          }).join('')+'</ul>'); continue;
        }
        out.push('<ul>'+items.map(function(it){return '<li>'+inline(it)+'</li>';}).join('')+'</ul>'); continue;
      }
      // ordered list
      if(/^\s*\d+\.\s+/.test(ln)){
        var oi=[];
        while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ oi.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
        out.push('<ol>'+oi.map(function(it){return '<li>'+inline(it)+'</li>';}).join('')+'</ol>'); continue;
      }
      // paragraph
      var para=[ln]; i++;
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) && !/^---+\s*$/.test(lines[i])
            && !/^\s*\|.*\|\s*$/.test(lines[i]) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])){
        para.push(lines[i]); i++;
      }
      out.push('<p>'+inline(para.join(' '))+'</p>');
    }
    return { html: out.join('\n'), toc: toc };
  }

  // ---------- TOC ----------
  var tocWrap = document.querySelector('[data-toc-wrap]');
  function buildToc(toc){
    if(tocWrap) tocWrap.hidden = !toc.length;
    tocEl.innerHTML = toc.map(function(t){
      return '<a href="#'+t.id+'" class="lvl-'+t.lv+'" data-toc-link="'+t.id+'">'+esc(t.txt)+'</a>';
    }).join('');
    tocEl.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', function(e){
        e.preventDefault();
        var el=document.getElementById(a.getAttribute('href').slice(1));
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      });
    });
  }

  // ---------- 선택 ----------
  function select(id){
    var r = reports.filter(function(x){return x.id===id;})[0];
    if(!r) return;
    current = r;
    var res = renderMd(r.md);
    docEl.innerHTML = res.html;
    buildToc(res.toc);
    crumbEl.textContent = r.title;
    document.title = r.title + ' | 상인월드';
    navEl.querySelectorAll('.nav__item').forEach(function(n){ n.classList.toggle('is-active', n.dataset.navItem===id); });
    if(window.lucide) window.lucide.createIcons();
    window.scrollTo(0,0);
    closeSidebar();
  }

  // ---------- 사이드바 ----------
  function buildNav(){
    // 카테고리(탭)별 그룹핑 — 첫 등장 순서 유지
    var cats=[], byCat={};
    reports.forEach(function(r){
      if(!byCat[r.category]){ byCat[r.category]=[]; cats.push(r.category); }
      byCat[r.category].push(r);
    });
    navEl.innerHTML = cats.map(function(cat){
      var items = byCat[cat].map(function(r){
        return '<a class="nav__item" data-nav-item="'+r.id+'">'
          +'<span class="nav__item-title">'+esc(r.title)+'</span>'
          +'<span class="nav__item-date">'+esc(r.date)+'</span></a>';
      }).join('');
      return '<div class="nav__group"><div class="nav__label">'+esc(cat)+'</div><div class="nav">'+items+'</div></div>';
    }).join('');
    navEl.querySelectorAll('.nav__item').forEach(function(n){
      n.addEventListener('click', function(){ select(n.dataset.navItem); });
    });
  }
  function openSidebar(){ sidebar.classList.add('is-open'); scrim.classList.add('is-open'); }
  function closeSidebar(){ sidebar.classList.remove('is-open'); scrim.classList.remove('is-open'); }
  document.querySelector('[data-menu]').addEventListener('click', openSidebar);
  scrim.addEventListener('click', closeSidebar);

  // ---------- 다크/라이트 테마 토글 (localStorage 저장, 미설정 시 시스템 따름) ----------
  (function(){
    var root = document.documentElement;
    var saved = null;
    try { saved = localStorage.getItem('report-theme'); } catch(e){}
    if(saved==='dark'||saved==='light') root.setAttribute('data-theme', saved);
    var btn = document.querySelector('[data-theme-toggle]');
    if(btn) btn.addEventListener('click', function(){
      var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var cur = root.getAttribute('data-theme') || (sysDark ? 'dark' : 'light');
      var next = cur==='dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('report-theme', next); } catch(e){}
    });
  })();

  // ---------- 다운로드 ----------
  dlBtn.addEventListener('click', function(){
    if(!current) return;
    var blob = new Blob([current.md], {type:'text/markdown;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = current.file;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });

  // ---------- init ----------
  buildNav();
  if(reports.length) select(reports[0].id);
  if(window.lucide) window.lucide.createIcons();
})();
</script>
</body>
</html>
