<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 | 상인월드</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-shell__media">
    <video src="../image/stu-hd-vd.webm" muted loop playsinline autoplay></video>
    <a class="auth-shell__logo" href="../">상인월드</a>
    <div class="auth-quote" data-auth-quote></div>
  </div>

  <div class="auth-shell__form">
    <div class="auth-card">
      <a class="auth-card__logo" href="../">상인월드</a>
      <h1 class="auth-card__title">다시 만나서 반가워요</h1>
      <p class="auth-card__desc">로그인하고 이어서 영상을 만들어보세요.</p>

      <form>
        <div class="form-field">
          <label for="email">이메일</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-field">
          <div class="form-field__row">
            <label for="password">비밀번호</label>
            <a class="form-field__link" href="#">비밀번호를 잊으셨나요?</a>
          </div>
          <input class="form-input" type="password" id="password" name="password" placeholder="비밀번호 입력" required>
        </div>
        <button class="btn-cta" type="submit" style="width:100%;justify-content:center;">로그인</button>
      </form>

      <div class="auth-divider">또는</div>
      <button class="btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.5 12.3c0-.85-.08-1.67-.22-2.45H12v4.63h6.46c-.28 1.5-1.13 2.77-2.4 3.62v3h3.88c2.27-2.09 3.56-5.17 3.56-8.8z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.94-2.9l-3.88-3c-1.08.72-2.45 1.15-4.06 1.15-3.12 0-5.77-2.11-6.71-4.94H1.28v3.1C3.26 21.3 7.3 24 12 24z"/><path fill="#FBBC05" d="M5.29 14.31A7.2 7.2 0 0 1 4.9 12c0-.8.14-1.58.39-2.31v-3.1H1.28A11.98 11.98 0 0 0 0 12c0 1.93.46 3.76 1.28 5.41l4.01-3.1z"/><path fill="#EA4335" d="M12 4.75c1.76 0 3.34.61 4.58 1.79l3.44-3.44C17.94 1.19 15.24 0 12 0 7.3 0 3.26 2.7 1.28 6.59l4.01 3.1C6.23 6.86 8.88 4.75 12 4.75z"/></svg>
        Google로 계속하기
      </button>

      <p class="auth-card__foot">아직 계정이 없으신가요? <a href="../signup/">회원가입</a></p>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
</body>
</html>
